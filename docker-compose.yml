version: '3.8'

services:
  web:
    build: .
    restart: always
    command: python -m src.main
    ports:
      - "8080:8080"
    environment:
      - FLASK_ENV=production
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - .:/app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/login"]
      interval: 30s
      timeout: 10s
      retries: 3

  worker:
    build: .
    restart: always
    command: celery -A src.core.celery_app.celery worker --loglevel=info --autoscale=10,3
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      web:
        condition: service_healthy
    volumes:
      - .:/app

volumes:
  postgres_data:
