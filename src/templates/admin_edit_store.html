<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تعديل المتجر: {{ store.name }}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap');
        body { font-family: 'Tajawal', sans-serif; background-color: #f3f4f6; }
    </style>
</head>
<body class="text-gray-800 p-10">
    <div class="max-w-4xl mx-auto bg-white p-8 rounded-xl shadow-xl border border-gray-200">
        <div class="flex justify-between items-center mb-6 border-b pb-4">
            <h2 class="text-3xl font-black text-blue-800">تعديل بيانات المشترك: {{ store.name }}</h2>
            <a href="/dashboard" class="bg-gray-200 text-gray-700 px-4 py-2 rounded font-bold hover:bg-gray-300 transition">العودة للوحة الرئيسية</a>
        </div>
        
        <form action="/dashboard/edit_store/{{ store.id }}" method="POST" class="grid grid-cols-2 gap-6">
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">اسم المتجر / الشركة *</label>
                <input type="text" name="name" value="{{ store.name }}" class="border border-gray-300 p-3 w-full rounded outline-none focus:border-blue-500" required>
            </div>
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">بلد المتجر</label>
                <input type="text" name="country" value="{{ store.country or '' }}" class="border border-gray-300 p-3 w-full rounded outline-none focus:border-blue-500">
            </div>

            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">اسم المالك</label>
                <input type="text" name="owner_name" value="{{ store.owner_name or '' }}" class="border border-gray-300 p-3 w-full rounded outline-none focus:border-blue-500">
            </div>
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">رقم هاتف المالك</label>
                <input type="text" name="owner_phone" value="{{ store.owner_phone or '' }}" class="border border-gray-300 p-3 w-full rounded outline-none focus:border-blue-500" dir="ltr">
            </div>

            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">قيمة الاشتراك بالدولار ($)</label>
                <input type="number" step="0.01" name="fee" value="{{ store.subscription_fee }}" class="border border-gray-300 p-3 w-full rounded outline-none focus:border-blue-500" required>
            </div>
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">تمديد الاشتراك (إضافة أيام من اليوم)</label>
                <input type="number" name="expires_in" placeholder="اتركه فارغاً للإبقاء على التاريخ القديم" class="border border-gray-300 p-3 w-full rounded outline-none focus:border-blue-500">
            </div>

            <div class="col-span-2 border-t pt-4 mt-2">
                <h3 class="font-black text-gray-800 mb-4">🔑 توكنات الربط (API Tokens)</h3>
                <div class="grid grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-bold text-blue-500 mb-1">توكن تيليجرام (Telegram)</label>
                        <input type="text" name="telegram_token" value="{{ store.telegram_token }}" class="border border-gray-300 p-3 w-full rounded font-mono text-left" dir="ltr" required>
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-green-500 mb-1">توكن واتساب (WhatsApp)</label>
                        <input type="text" name="whatsapp_token" value="{{ store.whatsapp_token or '' }}" class="border border-gray-300 p-3 w-full rounded font-mono text-left" dir="ltr">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-pink-500 mb-1">توكن إنستجرام (Instagram)</label>
                        <input type="text" name="instagram_token" value="{{ store.instagram_token or '' }}" class="border border-gray-300 p-3 w-full rounded font-mono text-left" dir="ltr">
                    </div>
                </div>
            </div>

            <div class="col-span-2 flex justify-end mt-6">
                <button type="submit" class="bg-blue-600 text-white px-10 py-4 rounded-xl font-black text-lg hover:bg-blue-700 shadow-lg w-full">حفظ التعديلات وتحديث النظام 💾</button>
            </div>
        </form>
    </div>
</body>
</html>
