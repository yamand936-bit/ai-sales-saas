<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Admin Security Gate</title>
    <style>
        body { 
            background-color: #111827; 
            color: #ffffff; 
            font-family: system-ui, -apple-system, sans-serif; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
            direction: rtl; 
        }
        .container {
            background-color: #1f2937;
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid #374151;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .icon {
            width: 80px; height: 80px;
            background: linear-gradient(to top right, #9333ea, #3b82f6);
            border-radius: 20px;
            margin: 0 auto 20px auto;
            display: flex; align-items: center; justify-content: center;
            font-size: 40px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }
        h1 { margin: 0 0 5px 0; font-size: 24px; }
        p { color: #9ca3af; font-size: 14px; margin-top: 0; }
        input {
            width: 100%; padding: 15px; margin-top: 20px; margin-bottom: 20px;
            background-color: #111827; border: 1px solid #374151;
            color: white; border-radius: 12px; font-size: 20px;
            text-align: center; letter-spacing: 5px; box-sizing: border-box;
            outline: none;
        }
        input:focus { border-color: #a855f7; box-shadow: 0 0 0 2px rgba(168, 85, 247, 0.4); }
        button {
            width: 100%; padding: 15px; border: none; border-radius: 12px;
            background: linear-gradient(to right, #9333ea, #2563eb);
            color: white; font-weight: bold; font-size: 16px;
            cursor: pointer; transition: transform 0.2s;
        }
        button:hover { opacity: 0.9; transform: translateY(-2px); }
        .alert { padding: 15px; margin-bottom: 20px; border-radius: 10px; font-size: 14px; }
        .alert-error { background-color: rgba(220, 38, 38, 0.2); color: #fca5a5; border: 1px solid rgba(220, 38, 38, 0.5); }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">🔐</div>
        <h1>{{ _('admin_secure_login') }}</h1>
        <p>{{ _('admin_portal_sub') }}</p>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-error">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form action="/admin/login" method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <input type="password" name="password" placeholder="••••••••" required title="{{ _('admin_password') }}">
            <button type="submit">{{ _('admin_login_btn') }}</button>
        </form>
        
        <div style="margin-top: 30px;">
            <a href="/login" style="color: #6b7280; font-size: 12px; text-decoration: none;">{{ _('return_merchant') }}</a>
        </div>
    </div>
</body>
</html>
