<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>{{ t('edit_product_title') }} - {{ product.name }}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap');
        body { font-family: 'Tajawal', sans-serif; background-color: #f3f4f6; }
    </style>
</head>
<body class="text-gray-800 p-10">
    <div class="max-w-3xl mx-auto bg-white p-8 rounded-xl shadow-xl border-t-4 border-purple-500">
        <div class="flex justify-between items-center mb-6 border-b pb-4">
            <h2 class="text-3xl font-black text-purple-800">{{ t('edit_product_title') }}: {{ product.name }}</h2>
            <a href="/merchant/{{ store.id }}" class="bg-gray-200 text-gray-700 px-4 py-2 rounded font-bold hover:bg-gray-300 transition">{{ t('back_to_dashboard') }}</a>
        </div>
        
        <form action="/merchant/{{ store.id }}/edit_product/{{ product.id }}" method="POST" class="grid grid-cols-2 gap-6">
            <div class="col-span-2">
                <label class="block text-sm font-bold text-gray-700 mb-2">{{ t('product_name') }}</label>
                <input type="text" name="name" value="{{ product.name }}" class="border border-gray-300 p-3 w-full rounded outline-none focus:border-purple-500" required>
            </div>
            
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-2">{{ t('product_price') }} ({{ store.currency }})</label>
                <input type="number" step="0.01" name="price" value="{{ product.price }}" class="border border-gray-300 p-3 w-full rounded outline-none focus:border-purple-500" required>
            </div>
            
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-2">{{ t('product_category_lbl') }}</label>
                <input type="text" name="category" value="{{ product.category or '' }}" class="border border-gray-300 p-3 w-full rounded outline-none focus:border-purple-500" required>
            </div>
            
            <div class="col-span-2">
                <label class="block text-sm font-bold text-gray-700 mb-2">{{ t('product_img_url') }}</label>
                <input type="url" name="image_url" value="{{ product.image_url or '' }}" class="border border-gray-300 p-3 w-full rounded outline-none focus:border-purple-500 text-left" dir="ltr">
                {% if product.image_url %}
                <div class="mt-4 border rounded p-2 inline-block"><img src="{{ product.image_url }}" class="h-24 rounded"></div>
                {% endif %}
            </div>
            
            <div class="col-span-2">
                <label class="block text-sm font-bold text-gray-700 mb-2">{{ t('product_desc_ai') }}</label>
                <textarea name="description" class="border border-gray-300 p-3 w-full rounded outline-none focus:border-purple-500" rows="4" required>{{ product.description }}</textarea>
            </div>
            
            {% if product.has_sizes %}
            <div class="col-span-2 mt-2 bg-gray-50 p-4 border rounded">
                <label class="block text-sm font-bold text-gray-700 mb-2">إدارة وفرة المخزون للمقاسات المتوفرة (أزل التحديد لإيقاف بيع مقاس)</label>
                <div class="flex gap-4 flex-wrap mt-3">
                    {% for size, is_available in sizes_dict.items() %}
                    <label class="flex items-center gap-2 bg-white px-4 py-2 rounded border shadow-sm cursor-pointer hover:bg-purple-50 transition">
                        <input type="checkbox" data-size="{{ size }}" autocomplete="off" {% if is_available %}checked{% endif %} class="size-checkbox w-5 h-5 text-purple-600 rounded">
                        <span class="font-bold text-gray-800 text-lg dir-ltr">{{ size }}</span>
                    </label>
                    {% endfor %}
                </div>
            </div>
            <script>
                document.querySelectorAll('.size-checkbox').forEach(cb => {
                    cb.addEventListener('change', async (e) => {
                        const size = e.target.getAttribute('data-size');
                        const isActive = e.target.checked;
                        try {
                            const res = await fetch('/api/products/{{ product.id }}/sizes', {
                                method: 'POST',
                                headers: {'Content-Type': 'application/json'},
                                body: JSON.stringify({size: size, is_active: isActive})
                            });
                            if (!res.ok) alert("حدث خطأ أثناء تحديث حالة المقاس.");
                        } catch (err) {
                            alert("فشل الاتصال بالخادم.");
                        }
                    });
                });
            </script>
            {% endif %}
            
            <div class="col-span-2 flex justify-between mt-6">
                <!-- Delete Button form -->
                <button type="button" onclick="if(confirm('هل أنت متأكد من حذف هذا المنتج؟')) { document.getElementById('delete-form').submit(); }" class="bg-red-100 text-red-700 px-6 py-3 rounded-lg font-black hover:bg-red-200 transition">{{ t('delete_product_btn') }}</button>
                <button type="submit" class="bg-purple-600 text-white px-10 py-3 rounded-lg font-black hover:bg-purple-700 shadow-md">{{ t('save_changes') }}</button>
            </div>
        </form>

        <form id="delete-form" action="/merchant/{{ store.id }}/delete_product/{{ product.id }}" method="POST" class="hidden"></form>
    </div>
</body>
</html>
